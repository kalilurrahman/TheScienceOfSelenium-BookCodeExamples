name: CI — Java Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Java files
        run: |
          echo "Checking Java source files..."
          find . -name "*.java" | head -20
          echo "Java files found: $(find . -name '*.java' | wc -l)"
